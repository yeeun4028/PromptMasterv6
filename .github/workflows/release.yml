name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e. v1.0, v20.15.10

jobs:
  build_and_release:
    name: Build WPF App and Publish Release
    runs-on: windows-latest

    permissions:
      contents: write # Needed for creating releases

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Application
      # Publish parameters:
      # -c Release: Release configuration
      # -r win-x64: Target win-x64 platform
      # --self-contained false: Framework-dependent (依赖用户电脑上的 .NET 8)
      # -p:PublishSingleFile=true: Generate single executable
      # -o publish: Output to 'publish' directory
      run: >
        dotnet publish PromptMasterv6.csproj 
        -c Release 
        -r win-x64 
        --self-contained false 
        -p:PublishSingleFile=true 
        -o publish

    - name: Prepare Release Artifacts
      shell: pwsh
      run: |
        # Create a staging folder for the zip contents
        $Version = "${{ github.ref_name }}"
        $ReleaseFolder = "PromptMasterv6-$Version-win-x64"
        New-Item -ItemType Directory -Force -Path $ReleaseFolder
        
        # 【核心修复部分】：将 publish 目录下所有的文件（包含 exe 和必不可少的 runtimeconfig.json 等）全部复制
        Copy-Item -Path "publish/*" -Destination $ReleaseFolder/ -Recurse
        
        # Copy specific configuration files
        if (Test-Path "config.json") {
            Copy-Item -Path "config.json" -Destination $ReleaseFolder/
        } else {
            Write-Host "config.json not found, skipping."
        }
        
        if (Test-Path "local_settings.json") {
            Copy-Item -Path "local_settings.json" -Destination $ReleaseFolder/
        } else {
            Write-Host "local_settings.json not found, skipping."
        }
        
        # Compress the folder into a ZIP file
        Compress-Archive -Path "$ReleaseFolder/*" -DestinationPath "$ReleaseFolder.zip" -Force

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          PromptMasterv6-${{ github.ref_name }}-win-x64.zip