name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 等标签时触发

jobs:
  build_and_release:
    name: Build WPF App and Publish Release
    runs-on: windows-latest

    permissions:
      contents: write # 必须的权限，用于创建 Release 并上传文件

    steps:
    - name: 1. 检出源代码
      uses: actions/checkout@v4

    - name: 2. 配置 .NET 8 环境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: 3. 还原依赖项
      run: dotnet restore

    - name: 4. 执行发布 (完全映射你的本地 VS 配置，强制 7MB 单文件)
      run: >
        dotnet publish PromptMasterv6.csproj 
        -c Release 
        -r win-x64 
        --no-self-contained 
        -p:SelfContained=false 
        -p:PublishSingleFile=true 
        -o publish

    - name: 5. 组装发布包 (提取exe，并将 json 独立压缩成 config.zip)
      shell: pwsh
      run: |
        $Version = "${{ github.ref_name }}"
        $ReleaseFolder = "PromptMasterv6-$Version-win-x64"
        
        # 创建最终要发给用户的外层文件夹
        New-Item -ItemType Directory -Force -Path $ReleaseFolder
        
        # 提取 publish 目录下的所有程序文件 (exe, pdb, ico等)
        Copy-Item -Path "publish/*" -Destination $ReleaseFolder/ -Recurse
        
        # === 新增逻辑：将配置文件打包成 config.zip ===
        $ConfigTempFolder = "TempConfigForZip"
        New-Item -ItemType Directory -Force -Path $ConfigTempFolder
        $HasConfig = $false
        
        if (Test-Path "config.json") {
            Copy-Item -Path "config.json" -Destination $ConfigTempFolder/
            $HasConfig = $true
            Write-Host "已提取 config.json"
        }
        
        if (Test-Path "local_settings.json") {
            Copy-Item -Path "local_settings.json" -Destination $ConfigTempFolder/
            $HasConfig = $true
            Write-Host "已提取 local_settings.json"
        }
        
        if ($HasConfig) {
            # 将这两个 json 文件压缩成 config.zip，直接存放到 exe 所在的目录中
            Compress-Archive -Path "$ConfigTempFolder/*" -DestinationPath "$ReleaseFolder/config.zip" -Force
            Write-Host "成功生成 config.zip 并放置在程序目录中"
        }
        # ===============================================
        
        # 将整个发布文件夹打包成最终对外的 ZIP 包
        Compress-Archive -Path "$ReleaseFolder/*" -DestinationPath "$ReleaseFolder.zip" -Force

    - name: 6. 自动创建 GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          PromptMasterv6-${{ github.ref_name }}-win-x64.zip