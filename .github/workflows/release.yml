name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 等标签时触发

jobs:
  build_and_release:
    name: Build WPF App and Publish Release
    runs-on: windows-latest

    permissions:
      contents: write # 必须的权限，用于创建 Release 并上传文件

    steps:
    - name: 1. 检出源代码
      uses: actions/checkout@v4

    - name: 2. 配置 .NET 8 环境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: 3. 还原依赖项
      run: dotnet restore

    - name: 4. 执行发布 (完全映射你的本地 VS 配置)
      # -c Release: Release Any CPU
      # -r win-x64: 目标运行时 win-x64
      # --self-contained false: 部署模式 -> 依赖框架
      # -p:PublishSingleFile=true: 文件发布选项 -> 生成单个文件
      run: >
        dotnet publish PromptMasterv6.csproj 
        -c Release 
        -r win-x64 
        --self-contained false 
        -p:PublishSingleFile=true 
        -o publish

    - name: 5. 组装发布包 (提取exe, ico, pdb及json配置)
      shell: pwsh
      run: |
        # 创建临时文件夹用于压缩
        $Version = "${{ github.ref_name }}"
        $ReleaseFolder = "PromptMasterv6-$Version-win-x64"
        New-Item -ItemType Directory -Force -Path $ReleaseFolder
        
        # 提取 publish 目录下的所有文件（就是你提到的 exe, pdb, ico 这三个文件）
        Copy-Item -Path "publish/*" -Destination $ReleaseFolder/ -Recurse
        
        # 提取根目录的配置文件
        if (Test-Path "config.json") {
            Copy-Item -Path "config.json" -Destination $ReleaseFolder/
            Write-Host "已成功打包 config.json"
        } else {
            Write-Host "警告: 未找到 config.json"
        }
        
        if (Test-Path "local_settings.json") {
            Copy-Item -Path "local_settings.json" -Destination $ReleaseFolder/
            Write-Host "已成功打包 local_settings.json"
        } else {
            Write-Host "警告: 未找到 local_settings.json"
        }
        
        # 将文件夹打包成 ZIP
        Compress-Archive -Path "$ReleaseFolder/*" -DestinationPath "$ReleaseFolder.zip" -Force

    - name: 6. 自动创建 GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          PromptMasterv6-${{ github.ref_name }}-win-x64.zip